optics:
  backend: deeplens
  cache_device: cuda
  lens_file: configs/edof_reproduction/a489_poly1d_base.json
  cache_file: wavefront_cache_1x1_512_v2.pt
  focus_depth_mm: -300.0
  depths_mm: [-200.0, -300.0, -10000.0]
  wavelengths_rgb_um:
    - [0.62, 0.66, 0.70]
    - [0.50, 0.53, 0.56]
    - [0.45, 0.47, 0.49]
  field_grid: 1
  simulation_grid: 512
  psf_size: 63
  coherent_rays: 1000000
  doe_size_mm: 3.0
  f_number: 2.2
  sensor_resolution: [1000, 1000]
  doe_normalization_radius_mm: 2.1213203435596424
  finetune_field_grid: 2
  finetune_psf_mode: exact
  finetune_psf_cache_file: fixed_psf_map_2x2_512.pt
  finetune_psf_save_every_fields: 1
  quantization_levels: 16
  quantize_during_training: false
  cache_complex_dtype: complex128
  propagation_precision: float64
  propagation_batch_size: 1
network:
  width: 32
  middle_blk_num: 1
  enc_blk_nums: [1, 1, 1, 28]
  dec_blk_nums: [1, 1, 1, 1]
dataset:
  mode: div2k
  root: datasets/DIV2K_train_HR
  crop_size: 128
  batch_size: 1
  workers: 0
evaluation:
  enabled: false
training:
  seed: 240608
  device: cuda
  joint_epochs: 0
  finetune_epochs: 1
  max_batches_per_epoch: 1
  doe_lr: 0.1
  network_lr: 0.0001
  finetune_lr: 0.00005
  warmup_epochs: 0
  accumulation_steps: 1
  pixel_loss_weight: 1.0
  perceptual_weight: 0.1
  pixel_loss_type: mse
  cross_depth_loss_weight: 0.1
  depth_loss_weights: [1.0, 1.0, 1.0]
  local_field_patches: true
  gradient_clip: 1.0
  sensor_noise_std: 0.01
  psf_pretrain_steps: 0
  checkpoint_every: 1
  log_every_batches: 1
  initialize_from: workspace/edof_reproduction/windows_optimized/checkpoints/best.pt
output:
  root: workspace/edof_reproduction
  run_name: windows_practical_memory
  workspace_id: default
